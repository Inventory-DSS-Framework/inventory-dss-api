services:
  db:
    image: postgres:16
    container_name: inventory_dss_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory_dss
    ports:
      - "5433:5432"
    volumes:
      - inventory_dss_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory_dss"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional web UI to inspect the DB at http://localhost:8080
  adminer:
    image: adminer
    container_name: inventory_dss_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  inventory_dss_pgdata:
